<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Signup | My Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=2070&auto=format&fit=crop'); background-size: cover;">

    <div class="auth-container">
        <div id="signup-form">
            <h2>Create Account</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="registerUser()">Sign Up</button>
            <p>Already have an account? <a href="#" onclick="toggleForm()">Login here</a></p>
        </div>

        <div id="login-form" style="display: none;">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="loginUser()">Login</button>
            <p>New user? <a href="#" onclick="toggleForm()">Register here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
