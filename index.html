<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibestore - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VIBESTORE</div>
        
        <input type="text" id="search-input" placeholder="Search for products..." onkeyup="filterProducts()">
        
        <div class="nav-links">
            <a href="cart.html" id="cart-btn">
                🛒 Cart (<span id="cart-count">0</span>)
            </a>
            
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <header class="hero">
        <h1 id="welcome-msg">Welcome to our Shop!</h1>
    </header>

    <main class="container">
        <h2>Featured Products</h2>
        <div id="product-container" class="product-grid">
            </div>
    </main>

    <script src="home.js"></script>
</body>
</html>
